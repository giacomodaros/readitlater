<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4efe5;
      color: #1a1a1a;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #e8e1d3;
    }

    .stripes {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-shrink: 0;
    }
    .stripes span {
      height: 3px;
      border-radius: 2px;
      display: block;
    }
    .stripes span:nth-child(1) { width: 18px; background: #7B6AEE; }
    .stripes span:nth-child(2) { width: 14px; background: #2DB87A; }
    .stripes span:nth-child(3) { width: 10px; background: #6CBAFC; }

    .header-text {
      display: flex;
      flex-direction: column;
    }
    .header-title {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.2;
    }
    .header-sub {
      font-size: 10px;
      color: #888;
      line-height: 1.2;
    }

    .body {
      padding: 14px 16px;
    }

    .url-box {
      font-size: 11px;
      color: #555;
      background: #ede8de;
      border: 1px solid #e8e1d3;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    button {
      width: 100%;
      padding: 9px 14px;
      border-radius: 7px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #save-btn {
      background: #7B6AEE;
      color: #fff;
    }
    #save-btn:not(:disabled):hover { opacity: 0.88; }

    .status {
      margin-top: 10px;
      font-size: 12px;
      border-radius: 6px;
      padding: 8px 10px;
      display: none;
    }
    .status.success {
      display: block;
      background: #e2f7ed;
      color: #1a7a4a;
    }
    .status.error {
      display: block;
      background: #fdf0e4;
      color: #c0541a;
    }
    .status.already {
      display: block;
      background: #ece9fd;
      color: #4a3ab0;
    }

    .open-link {
      display: block;
      margin-top: 8px;
      font-size: 11px;
      color: #7B6AEE;
      text-decoration: none;
      text-align: center;
    }
    .open-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <div class="stripes">
      <span></span><span></span><span></span>
    </div>
    <div class="header-text">
      <span class="header-title">Reader</span>
      <span class="header-sub">read it later</span>
    </div>
  </div>

  <div class="body">
    <div class="url-box" id="url-display">Loading...</div>
    <button id="save-btn">Save to Reader</button>
    <div class="status" id="status"></div>
    <a class="open-link" id="open-link" href="https://readlater-pi.vercel.app" target="_blank">Open Reader →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
